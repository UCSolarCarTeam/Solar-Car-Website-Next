version: "3.9"
services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    image: chatbot-scraper:latest
    env_file:
      - .env.local
    volumes:
      - ./documents.json:/app/documents.json
      - ./members.json:/app/members.json
      - ./scripts:/app/scripts:ro
    restart: "no"
    # The image's CMD runs python scripts/main.py by default.
